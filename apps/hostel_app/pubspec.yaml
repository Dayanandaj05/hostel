name: hostel_app
description: Production-ready Hostel Management System (Flutter + Firebase)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  intl: ^0.19.0
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.1.2
  go_router: ^14.8.1
  provider: ^6.1.2
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
